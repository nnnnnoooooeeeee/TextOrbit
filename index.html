<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextOrbit - Text Follows Your Line</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>TextOrbit</h1>
            <p class="tagline">Draw a line. Watch your text orbit it.</p>
        </header>

        <main class="workspace">
            <section class="canvas-wrap">
                <canvas id="stage"></canvas>
                <div class="hint" id="hint">Click &amp; drag (or touch) to draw a path</div>
                <div class="canvas-toolbar">
                    <button type="button" id="modeDraw" class="chip active" title="Drawing mode">Draw</button>
                    <button type="button" id="modeView" class="chip" title="View/animate mode">View</button>
                    <button type="button" id="playPause" class="chip" title="Play / Pause">Pause</button>
                    <button type="button" id="fullscreenBtn" class="chip" title="Fullscreen / screensaver">Fullscreen</button>
                    <button type="button" id="clearBtn" class="chip danger" title="Clear path">Clear</button>
                </div>
            </section>

            <aside class="panel">
                <div class="panel-group">
                    <label class="field">
                        <span>Text</span>
                        <input type="text" id="textInput" value="TextOrbit follows your line " maxlength="200">
                    </label>
                </div>

                <div class="panel-group grid-2">
                    <label class="field">
                        <span>Font Family</span>
                        <select id="fontFamily">
                            <option value="'Segoe UI', system-ui, sans-serif">Sans Serif</option>
                            <option value="Georgia, 'Times New Roman', serif">Serif</option>
                            <option value="'Courier New', monospace">Monospace</option>
                            <option value="'Comic Sans MS', cursive">Comic</option>
                            <option value="Impact, sans-serif">Impact</option>
                            <option value="'Brush Script MT', cursive">Brush Script</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Font Style</span>
                        <select id="fontStyle">
                            <option value="normal">Normal</option>
                            <option value="bold">Bold</option>
                            <option value="italic">Italic</option>
                            <option value="bold italic">Bold Italic</option>
                        </select>
                    </label>
                </div>

                <div class="panel-group">
                    <label class="field range-field">
                        <span>Font Size <output id="fontSizeOut">28</output>px</span>
                        <input type="range" id="fontSize" min="8" max="120" value="28">
                    </label>

                    <label class="field range-field">
                        <span>Letter Spacing <output id="spacingOut">2</output>px</span>
                        <input type="range" id="spacing" min="-5" max="40" value="2">
                    </label>

                    <label class="field range-field">
                        <span>Speed <output id="speedOut">60</output></span>
                        <input type="range" id="speed" min="-200" max="200" value="60">
                    </label>

                    <label class="field range-field">
                        <span>Line Thickness <output id="strokeOut">2</output>px</span>
                        <input type="range" id="stroke" min="0" max="20" value="2">
                    </label>

                    <label class="field range-field" id="repeatGapField">
                        <span>Repeat Gap <output id="repeatGapOut">40</output>px</span>
                        <input type="range" id="repeatGap" min="0" max="500" value="40">
                    </label>
                </div>

                <div class="panel-group grid-2">
                    <label class="field">
                        <span>Font Color</span>
                        <input type="color" id="fontColor" value="#ffffff">
                    </label>
                    <label class="field">
                        <span>Canvas BG</span>
                        <input type="color" id="bgColor" value="#000000">
                    </label>
                    <label class="field">
                        <span>Line Color</span>
                        <input type="color" id="lineColor" value="#444444">
                    </label>
                    <label class="field">
                        <span>Direction</span>
                        <select id="direction">
                            <option value="1">Forward</option>
                            <option value="-1">Backward</option>
                        </select>
                    </label>
                </div>

                <div class="panel-group">
                    <label class="check">
                        <input type="checkbox" id="repeatText" checked>
                        <span>Repeat text along path</span>
                    </label>
                    <label class="check">
                        <input type="checkbox" id="showLine" checked>
                        <span>Show drawn line</span>
                    </label>
                    <label class="check">
                        <input type="checkbox" id="upright">
                        <span>Keep text upright</span>
                    </label>
                </div>

                <div class="panel-group actions">
                    <button type="button" id="saveBtn" class="chip">Save PNG</button>
                </div>

                <footer class="panel-footer">
                    Draw with your mouse or finger.
                </footer>
            </aside>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
